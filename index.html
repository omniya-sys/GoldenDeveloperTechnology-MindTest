<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Personality Test — Golden Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f49c04;
    --gold-light: #fbbf24;
    --gold-glow: rgba(244,156,4,0.18);
    --dark: #0c0c0e;
    --surface: #141416;
    --card: #1c1c20;
    --card2: #232328;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #8a8a9a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 48px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(244,156,4,0.09) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(244,156,4,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.5); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
    animation: fade-down 0.7s ease both;
  }
  .logo-wrap {
    width: 80px; height: 80px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 0 30px var(--gold-glow);
  }
  .logo-wrap img { width: 56px; }
  .logo-placeholder {
    font-family: 'Cairo', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(244,156,4,0.1);
    border: 1px solid rgba(244,156,4,0.25);
    color: var(--gold-light);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 14px;
  }
  .badge span { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: pulse 2s ease infinite; display:inline-block; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

  .header h1 {
    font-family: 'Cairo', sans-serif;
    font-weight: 800;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    text-align: center;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }
  .header h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--muted);
    font-size: 0.92rem;
    text-align: center;
    margin-top: 10px;
    max-width: 440px;
    line-height: 1.6;
  }

  .progress-bar-wrap {
    width: 100%;
    margin-bottom: 28px;
    animation: fade-in 0.8s ease both 0.2s;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .progress-track {
    height: 4px;
    background: var(--card2);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 100px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    animation: fade-up 0.6s ease both;
    box-shadow: 0 4px 40px rgba(0,0,0,0.4);
  }

  .name-section { margin-bottom: 28px; }
  .name-section label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input-wrap svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 18px; height: 18px;
  }
  #username {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #username::placeholder { color: var(--muted); }
  #username:focus {
    border-color: rgba(244,156,4,0.5);
    box-shadow: 0 0 0 3px var(--gold-glow);
  }

  .question-block {
    margin-bottom: 24px;
    animation: fade-up 0.4s ease both;
  }
  .question-block .q-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
  }
  .q-num {
    min-width: 26px; height: 26px;
    background: var(--gold-glow);
    border: 1px solid rgba(244,156,4,0.3);
    color: var(--gold);
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .q-text {
    font-weight: 500;
    font-size: 0.97rem;
    line-height: 1.5;
    color: var(--text);
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .option-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 0.88rem;
    line-height: 1.4;
    color: #c8c8d0;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .option-label::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(244,156,4,0.06), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .option-label:hover {
    border-color: rgba(244,156,4,0.35);
    color: var(--text);
    transform: translateY(-1px);
  }
  .option-label:hover::before { opacity: 1; }
  .option-label input[type="checkbox"] { display: none; }

  .custom-check {
    width: 18px; height: 18px;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }
  .custom-check svg { opacity: 0; transform: scale(0.5); transition: all 0.15s; }

  .option-label.selected {
    border-color: var(--gold);
    background: rgba(244,156,4,0.08);
    color: var(--text);
  }
  .option-label.selected .custom-check {
    background: var(--gold);
    border-color: var(--gold);
  }
  .option-label.selected .custom-check svg { opacity: 1; transform: scale(1); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--gold), #e08c00);
    color: #0c0c0e;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(244,156,4,0.25);
    position: relative;
    overflow: hidden;
  }
  .submit-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(244,156,4,0.35); }
  .submit-btn:hover::after { opacity: 1; }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn svg { width: 18px; height: 18px; }

  #resultScreen {
    display: none;
    animation: fade-up 0.7s ease both;
  }
  .result-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .result-header .greeting {
    font-size: 0.82rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .result-header h2 {
    font-family: 'Cairo', sans-serif;
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .result-header h2 span {
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .dominant-card {
    background: linear-gradient(135deg, rgba(244,156,4,0.12), rgba(244,156,4,0.04));
    border: 1px solid rgba(244,156,4,0.3);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .dominant-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(244,156,4,0.2), transparent 70%);
  }
  .dominant-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold-light);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .dominant-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 8px;
    color: var(--text);
  }
  .dominant-desc {
    font-size: 0.9rem;
    color: #b0b0bf;
    line-height: 1.65;
  }

  .scores-section { margin-bottom: 24px; }
  .scores-section h3 {
    font-family: 'Cairo', sans-serif;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .score-row { margin-bottom: 14px; }
  .score-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    margin-bottom: 6px;
  }
  .score-name { font-weight: 500; color: var(--text); }
  .score-pts { color: var(--muted); font-size: 0.78rem; }
  .score-track {
    height: 6px;
    background: var(--card2);
    border-radius: 100px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 100px;
    width: 0%;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }
  .fill-Analytical { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
  .fill-Creative   { background: linear-gradient(90deg, #a855f7, #c084fc); }
  .fill-People     { background: linear-gradient(90deg, #22c55e, #4ade80); }
  .fill-Leadership { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }

  .traits-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .trait-chip {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
    font-size: 0.8rem;
    color: #c0c0cc;
    font-weight: 500;
  }

  .share-section h3 {
    font-family: 'Cairo', sans-serif;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .share-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .share-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 16px;
    border-radius: var(--radius-sm);
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .share-btn.native { background: linear-gradient(135deg, var(--gold), #e08c00); color: #0c0c0e; }
  .share-btn.wa { background: #25d366; color: #fff; }
  .share-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .share-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .retry-btn {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius-sm);
    font-family: 'Cairo', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .retry-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  @keyframes fade-up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fade-down { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fade-in { from { opacity:0; } to { opacity:1; } }

  @media (max-width: 520px) {
    .card { padding: 22px 18px; }
    .options-grid { grid-template-columns: 1fr; }
    .traits-grid { grid-template-columns: repeat(2, 1fr); }
    .share-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="logo-wrap">
      <img src="logo.png" alt="Golden Developer" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="logo-placeholder" style="display:none">GD</span>
    </div>
    <div class="badge"><span></span> Career Discovery Tool</div>
    <h1>Discover Your <em>Career DNA</em></h1>
    <p>Answer 10 questions to reveal how you naturally think, work, and lead — and find the paths built for you.</p>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen">
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span>Your Progress</span>
        <span id="progressLabel">0 / 10 answered</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="card">
      <div class="name-section">
        <label for="username">Your Name</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="username" placeholder="e.g. Alex Johnson" autocomplete="off">
        </div>
      </div>

      <hr class="divider">

      <div id="questionsWrap"></div>

      <hr class="divider">

      <button class="submit-btn" onclick="calculateResult()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Reveal My Career Profile
      </button>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="resultScreen">
    <div class="card">
      <div class="result-header">
        <div class="greeting">Your Career Profile</div>
        <h2 id="resultName"></h2>
      </div>

      <div class="dominant-card">
        <div class="dominant-label">🏆 Primary Archetype</div>
        <div class="dominant-title" id="dominantTitle"></div>
        <div class="dominant-desc" id="dominantDesc"></div>
      </div>

      <div class="scores-section">
        <h3>Full Breakdown</h3>
        <div id="scoreRows"></div>
      </div>

      <div class="traits-grid" id="traitsGrid"></div>

      <hr class="divider">

      <div class="share-section">
        <h3>Share Your Profile</h3>
        <div class="share-grid" id="shareGrid"></div>
      </div>

      <button class="retry-btn" onclick="resetQuiz()">↩ Retake the Test</button>
    </div>
  </div>

</div>

<script>
const PAGE_URL = "https://omniya-sys.github.io/GoldenDeveloperTechnology-MindTest/";

const questions = [
  { q: "What excites you most in a project?", options: [
    { val: "Creative",    text: "Brainstorming & collaborating on innovative solutions" },
    { val: "Analytical",  text: "Analyzing data or solving technical problems" },
    { val: "People",      text: "Creating or improving tangible products/tools" },
    { val: "Leadership",  text: "Leading the team and setting direction" }
  ]},
  { q: "Which environment makes you most productive?", options: [
    { val: "Analytical",  text: "Quiet, organized workspace" },
    { val: "Creative",    text: "Fast-paced, ever-changing environment" },
    { val: "People",      text: "Open, collaborative creative studio" },
    { val: "Leadership",  text: "On-site, dynamic, hands-on setting" }
  ]},
  { q: "What gives you the greatest satisfaction?", options: [
    { val: "Analytical",  text: "Solving complex problems with precision" },
    { val: "Creative",    text: "Generating new ideas from scratch" },
    { val: "People",      text: "Helping others and making an impact" },
    { val: "Leadership",  text: "Leading a team to achieve results" }
  ]},
  { q: "Facing a new, complex challenge, you:", options: [
    { val: "Analytical",  text: "Follow best practices and proven procedures" },
    { val: "Creative",    text: "Invent a completely new solution" },
    { val: "People",      text: "Consult others and gather perspectives" },
    { val: "Leadership",  text: "Guide the team to overcome it together" }
  ]},
  { q: "Your preferred daily work routine?", options: [
    { val: "Analytical",  text: "Highly structured with a clear plan" },
    { val: "Creative",    text: "A mix of planned and spontaneous tasks" },
    { val: "People",      text: "Fast-paced with tight deadlines" },
    { val: "Leadership",  text: "Flexible and fully adaptive" }
  ]},
  { q: "In a team, your natural role is:", options: [
    { val: "Analytical",  text: "Planner & organizer" },
    { val: "Creative",    text: "Creative thinker & innovator" },
    { val: "People",      text: "Quality controller & analyst" },
    { val: "Leadership",  text: "Communicator & decision-maker" }
  ]},
  { q: "What comes most naturally to you?", options: [
    { val: "Analytical",  text: "Analyzing data and drawing conclusions" },
    { val: "Creative",    text: "Generating ideas and creative solutions" },
    { val: "People",      text: "Coordinating people and resources" },
    { val: "Leadership",  text: "Motivating and guiding others" }
  ]},
  { q: "What matters most when choosing a project?", options: [
    { val: "Analytical",  text: "Clear structure and reliable procedures" },
    { val: "Creative",    text: "Room to innovate and explore ideas" },
    { val: "People",      text: "Opportunity to help and impact others" },
    { val: "Leadership",  text: "Opportunity to lead and drive results" }
  ]},
  { q: "How do you handle pressure or challenges?", options: [
    { val: "Analytical",  text: "Stay calm, stick to the plan" },
    { val: "Creative",    text: "Adapt quickly and innovate on the fly" },
    { val: "People",      text: "Collaborate and distribute tasks" },
    { val: "Leadership",  text: "Take charge and steer the team" }
  ]},
  { q: "If you could freely choose your work, you'd focus on:", options: [
    { val: "Analytical",  text: "Analytical or research-driven projects" },
    { val: "Creative",    text: "Creative or design-forward projects" },
    { val: "People",      text: "Service or community-focused projects" },
    { val: "Leadership",  text: "Strategic or leadership-driven projects" }
  ]}
];

const archetypes = {
  Analytical: {
    title: "The Systems Thinker",
    desc: "Your mind works through logic, structure, and analysis. You naturally break down complex problems, identify patterns, and build clear systems to solve them. You perform best in environments that value accuracy, research, and deep thinking.",
    best: "Best career environments for you include data analysis, engineering, software development, financial analysis, research, and system architecture.",
    traits: ["Data-Driven","Logical","Detail-Focused","Structured","Analytical","Problem Solver"]
  },
  Creative: {
    title: "The Creative Innovator",
    desc: "Your mind thrives on imagination, exploration, and new ideas. You enjoy experimenting with concepts, building creative solutions, and seeing possibilities others often miss.",
    best: "You perform best in creative fields such as marketing, product design, branding, innovation strategy, content creation, and concept development.",
    traits: ["Imaginative","Idea Generator","Innovative","Curious","Design-Oriented","Visionary"]
  },
  People: {
    title: "The Human Connector",
    desc: "You are naturally people-focused. You understand emotions, build relationships easily, and create environments where teams work better together.",
    best: "You excel in careers such as community management, customer experience, HR, consulting, education, partnerships, and collaborative leadership roles.",
    traits: ["Empathetic","Collaborative","Supportive","Communicative","Relationship Builder","Team Oriented"]
  },
  Leadership: {
    title: "The Strategic Leader",
    desc: "You naturally take initiative and move people toward goals. You see the big picture, make decisions quickly, and drive projects forward.",
    best: "You perform best in leadership environments such as project management, entrepreneurship, operations leadership, strategy, and executive decision-making roles.",
    traits: ["Decisive","Strategic","Goal Driven","Influential","Organized","Action Oriented"]
  }
};

// ── State ──────────────────────────────────────────────
// selections[questionIndex] = chosen val (one per question — radio behaviour)
const selections = {};

// ── Build questions ────────────────────────────────────
const wrap = document.getElementById("questionsWrap");
questions.forEach((q, i) => {
  const div = document.createElement("div");
  div.className = "question-block";
  div.style.animationDelay = `${i * 0.04}s`;
  div.innerHTML = `
    <div class="q-label">
      <div class="q-num">${i + 1}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="options-grid">
      ${q.options.map((o) => `
        <label class="option-label" data-q="${i}" data-val="${o.val}">
          <input type="checkbox" name="q${i}" value="${o.val}">
          <div class="custom-check">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="#0c0c0e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
              width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span>${o.text}</span>
        </label>
      `).join('')}
    </div>
  `;
  wrap.appendChild(div);
});

// ── Option click handler (checkbox — multi-select) ─────
// selections[questionIndex] = Set of selected vals
document.getElementById("questionsWrap").addEventListener("click", function(e) {
  const label = e.target.closest(".option-label");
  if (!label) return;

  const q   = label.dataset.q;
  const val = label.dataset.val;
  const cb  = label.querySelector("input");

  if (!selections[q]) selections[q] = new Set();

  if (cb.checked) {
    // Uncheck
    cb.checked = false;
    label.classList.remove("selected");
    selections[q].delete(val);
    if (selections[q].size === 0) delete selections[q];
  } else {
    // Check
    cb.checked = true;
    label.classList.add("selected");
    selections[q].add(val);
  }

  updateProgress();
});

function updateProgress() {
  const answered = Object.keys(selections).length;
  const pct = (answered / 10) * 100;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `${answered} / 10 answered`;
}

// ── Calculate & show result ────────────────────────────
function calculateResult() {
  const username = document.getElementById("username").value.trim() || "You";
  const answered = Object.keys(selections).length;

  if (answered < 10) {
    alert(`Please answer all 10 questions. You've answered ${answered} so far.`);
    return;
  }

  // Tally scores — each selected option adds to its category
  const scores = { Creative: 0, Analytical: 0, People: 0, Leadership: 0 };
  Object.values(selections).forEach(set => {
    set.forEach(val => {
      if (scores[val] !== undefined) scores[val]++;
    });
  });

  // Find dominant type
  const sorted   = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const dominant = sorted[0][0];
  const arch     = archetypes[dominant];

  // Populate result screen
  document.getElementById("resultName").innerHTML = `<span>${username} — ${arch.title}</span>`;
  document.getElementById("dominantTitle").textContent = arch.title;
  document.getElementById("dominantDesc").innerHTML =
    arch.desc + "<br><br><strong>Where you perform best:</strong><br>" + arch.best;

  // Score bars — scale to total selections made
  const totalSelections = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
  const rowsWrap = document.getElementById("scoreRows");
  rowsWrap.innerHTML = sorted.map(([k, v]) => `
    <div class="score-row">
      <div class="score-meta">
        <span class="score-name">${k}</span>
        <span class="score-pts">${v} point${v !== 1 ? 's' : ''}</span>
      </div>
      <div class="score-track">
        <div class="score-fill fill-${k}" id="fill-${k}" style="width:0%"></div>
      </div>
    </div>
  `).join('');

  setTimeout(() => {
    sorted.forEach(([k, v]) => {
      const el = document.getElementById("fill-" + k);
      if (el) el.style.width = (v / totalSelections * 100) + "%";
    });
  }, 100);

  // Traits
  document.getElementById("traitsGrid").innerHTML =
    arch.traits.map(t => `<div class="trait-chip">${t}</div>`).join('');

  // Share buttons
  const shareText = `I just discovered my Career DNA — I'm "${arch.title}".\n\nCurious to know how your mind works? Take the 60-second test:\n${PAGE_URL}`;
  const waURL     = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;

  document.getElementById("shareGrid").innerHTML = `
    <button class="share-btn native" onclick="shareNative()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      Share My Result
    </button>
    <a href="${waURL}" target="_blank" class="share-btn wa">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      WhatsApp
    </a>
  `;

  // Switch screens
  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "block";
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Native share (Share button) ────────────────────────
function shareNative() {
  const titleEl = document.getElementById("dominantTitle").textContent;
  const text = `I just discovered my Career DNA at Golden Developer — I'm "${titleEl}".\n\nCurious to know how your mind works? Take the test:\n${PAGE_URL}`;

  if (navigator.share) {
    navigator.share({
      title: "Career Personality Test — Golden Developer",
      text: text,
      url: PAGE_URL
    }).catch(() => {});
  } else {
    // Fallback: copy to clipboard
    navigator.clipboard.writeText(text + "\n" + PAGE_URL).then(() => {
      alert("Link copied to clipboard! You can now paste and share it anywhere.");
    }).catch(() => {
      window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`);
    });
  }
}

// ── Reset ──────────────────────────────────────────────
function resetQuiz() {
  document.querySelectorAll('.option-label').forEach(l => {
    l.classList.remove("selected");
    const inp = l.querySelector("input");
    if (inp) inp.checked = false;
  });
  Object.keys(selections).forEach(k => delete selections[k]);
  document.getElementById("username").value = "";
  updateProgress();
  document.getElementById("resultScreen").style.display = "none";
  document.getElementById("quizScreen").style.display = "block";
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Particles ──────────────────────────────────────────
(function() {
  const container = document.getElementById("particles");
  for (let i = 0; i < 18; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100 + 100}%;
      animation-duration: ${8 + Math.random() * 12}s;
      animation-delay: ${Math.random() * 10}s;
      width: ${1 + Math.random() * 2}px;
      height: ${1 + Math.random() * 2}px;
      opacity: 0;
    `;
    container.appendChild(p);
  }
})();
</script>
</body>
