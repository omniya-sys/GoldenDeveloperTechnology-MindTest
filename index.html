<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Personality Test</title>
<style>
body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
h1 { color: #333; }
.question { margin-bottom: 20px; }
.options button { margin: 5px 0; display: block; }
#result { margin-top: 30px; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<h1>Discover Your Ideal Career Path</h1>
<div id="quiz"></div>
<div id="result"></div>

<script>
const questions = [
  {
    q: "Which type of work gives you the most energy?",
    options: [
      { val: "Creative", text: "Coming up with new ideas or innovative solutions" },
      { val: "Analytical", text: "Analyzing data or solving complex problems" },
      { val: "People", text: "Helping, mentoring, or interacting with others" },
      { val: "Leadership", text: "Leading a team or making strategic decisions" }
    ]
  },
  {
    q: "When faced with a challenge, what is your approach?",
    options: [
      { val: "Creative", text: "Think outside the box to find unique solutions" },
      { val: "Analytical", text: "Break it down logically and use data" },
      { val: "People", text: "Collaborate and get others' input" },
      { val: "Leadership", text: "Take charge and coordinate the team" }
    ]
  },
  {
    q: "What motivates you most in your work?",
    options: [
      { val: "Creative", text: "Creating something new or original" },
      { val: "Analytical", text: "Finding accurate answers and improving systems" },
      { val: "People", text: "Making a positive impact on others" },
      { val: "Leadership", text: "Influencing outcomes and achieving big goals" }
    ]
  },
  {
    q: "Which environment do you thrive in?",
    options: [
      { val: "Creative", text: "Flexible, dynamic, and open to experimentation" },
      { val: "Analytical", text: "Structured, data-driven, and detail-oriented" },
      { val: "People", text: "Team-focused and socially engaging" },
      { val: "Leadership", text: "High-responsibility with decision-making power" }
    ]
  }
];

// Define career suggestions for each archetype
const results = {
  Creative: {
    title: "Creative Thinker",
    careers: ["Advertising", "Design", "Entrepreneurship", "Research", "Arts & Media"],
    tips: [
      "Explore side projects to practice innovation",
      "Participate in competitions or creative workshops",
      "Seek environments that encourage experimentation"
    ]
  },
  Analytical: {
    title: "Analytical Mind",
    careers: ["Finance", "Engineering", "Project Management", "Research", "Data Analysis"],
    tips: [
      "Focus on improving problem-solving and critical thinking",
      "Work with structured data and analytics tools",
      "Practice breaking complex problems into actionable steps"
    ]
  },
  People: {
    title: "People-Oriented",
    careers: ["Marketing", "Human Resources", "Teaching", "Healthcare", "Customer Service"],
    tips: [
      "Engage in collaborative projects",
      "Develop communication and mentoring skills",
      "Participate in volunteering or social initiatives"
    ]
  },
  Leadership: {
    title: "Leadership & Strategy",
    careers: ["Executive Management", "Business Consulting", "Entrepreneurship", "Project Leadership", "Strategy Roles"],
    tips: [
      "Practice decision-making and strategic thinking",
      "Seek opportunities to lead small projects",
      "Learn to coordinate teams effectively"
    ]
  }
};

let scores = { Creative: 0, Analytical: 0, People: 0, Leadership: 0 };
let currentQuestion = 0;

const quizDiv = document.getElementById("quiz");
const resultDiv = document.getElementById("result");

function showQuestion() {
  const q = questions[currentQuestion];
  let html = `<div class="question"><strong>${q.q}</strong></div><div class="options">`;
  q.options.forEach(opt => {
    html += `<button onclick="selectOption('${opt.val}')">${opt.text}</button>`;
  });
  html += `</div>`;
  quizDiv.innerHTML = html;
}

function selectOption(val) {
  scores[val]++;
  currentQuestion++;
  if (currentQuestion < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  quizDiv.style.display = "none";
  const maxScore = Math.max(...Object.values(scores));
  const topTypes = Object.keys(scores).filter(key => scores[key] === maxScore);
  const primary = results[topTypes[0]];

  let html = `<h2>Your Dominant Style: ${primary.title}</h2>`;
  html += `<p><strong>Suggested Careers:</strong> ${primary.careers.join(", ")}</p>`;
  html += `<p><strong>Tips to Excel:</strong></p><ul>`;
  primary.tips.forEach(tip => html += `<li>${tip}</li>`);
  html += `</ul>`;
  if (topTypes.length > 1) {
    html += `<p><em>You also show strengths in: ${topTypes.slice(1).map(t => results[t].title).join(", ")}</em></p>`;
  }

  resultDiv.innerHTML = html;
}

// Start quiz
showQuestion();
</script>

</body>
</html>
